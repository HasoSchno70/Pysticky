name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

# Least-privilege-Default fuer den GITHUB_TOKEN -- der test-Job braucht nur
# Lesezugriff (Checkout + Tests/Lint), der build-Job hebt das gezielt auf
# contents: write an (fuers Release-Erstellen), siehe dort.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    # Qt headless: kein Display auf den Runnern -> Offscreen-Plattform.
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Check formatting with ruff
        run: |
          ruff format --check src/ tests/

      - name: Type-check with mypy
        run: |
          mypy

  build:
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build executable
        run: |
          pyinstaller pysticky.spec

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer with Inno Setup
        run: |
          $version = python -c "from pysticky.config import APP_VERSION; print(APP_VERSION)"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" setup.iss
          # pwsh wandelt einen Exitcode != 0 von nativen .exe NICHT automatisch
          # in einen fehlgeschlagenen Step um -- ohne diesen Check wuerde ein
          # ISCC-Fehler (z.B. erneut zu grosses Icon) den Step still gruen
          # durchlaufen lassen, obwohl kein Installer entstanden ist.
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySticky-Windows
          path: |
            dist/PySticky.exe
            installer_output/PySticky-Setup.exe
          if-no-files-found: error

      # Nur bei Versions-Tags (v1.2.3): baut nicht nur, sondern veroeffentlicht
      # .exe UND Installer direkt als herunterladbare GitHub-Release-Assets.
      # Ohne dies gaebe es nur das temporaere Actions-Artifact oben (verfaellt,
      # nur mit Repo-Zugriff sichtbar) statt oeffentlicher Download-Links.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "dist/PySticky.exe" "installer_output/PySticky-Setup.exe" `
            --repo "${{ github.repository }}" `
            --title "PySticky ${{ github.ref_name }}" `
            --generate-notes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
